services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: moderation
      MYSQL_USER: moderation_user
      MYSQL_PASSWORD: moderation_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umoderation_user", "-pmoderation_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  moderation-queue:
    build:
      context: ./moderation-queue
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: moderation
      DATABASE_USER: moderation_user
      DATABASE_PASSWORD: moderation_pass
    volumes:
      - ./moderation-queue:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  dailymotion-proxy:
    build:
      context: ./dailymotion-proxy
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      DAILYMOTION_API_BASE_URL: https://api.dailymotion.com
      CACHE_TTL: 300
    volumes:
      - ./dailymotion-proxy:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
