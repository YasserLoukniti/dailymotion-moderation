services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moderation
      POSTGRES_USER: moderation_user
      POSTGRES_PASSWORD: moderation_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation_user -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  moderation-queue:
    build:
      context: ./moderation-queue
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://moderation_user:moderation_pass@postgres:5432/moderation
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dailymotion-proxy:
    build:
      context: ./dailymotion-proxy
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      DAILYMOTION_API_BASE_URL: https://api.dailymotion.com
      CACHE_TTL: 300
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
